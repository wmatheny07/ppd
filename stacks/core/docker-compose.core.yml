networks:
  core_data_net:
    external: true
  mathenymanor:
    name: mathenymanor.docker
    external: true

volumes:
  postgres_data:
  minio_data:
  metabase_data:
  mlflow_data:
  qdrant_data:

services:
  redis:
    container_name: redis
    image: redis:7.2-bookworm
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - core_data_net
      - mathenymanor

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: analytics
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgres.conf" ]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/postgres.conf:/etc/postgresql/postgres.conf:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - core_data_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /media/nasdrive/mail_intelligence/minio:/data
    ports:
      - "9000:9000"
    networks:
      - core_data_net

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: analytics
      MB_DB_PASS: ${ANALYTICS_DB_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - metabase_data:/metabase-data
    networks:
      - core_data_net

  superset:
    build:
      context: .
      dockerfile: dockerfile.superset
    image: superset-with-playwright:latest
    container_name: superset
    environment: &superset-env
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: "no"
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://analytics:${ANALYTICS_DB_PASSWORD}@postgres:5432/superset
      ENABLE_PROXY_FIX: "true"
      SUPERSET_WEBSERVER_BASEURL: "https://superset.peakprecisiondata.com"
      SUPERSET_CONFIG_PATH: /app/pythonpath/config/superset_config.py
      RESEND_API_KEY: ${RESEND_API_KEY}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    volumes:
      - ./superset_home:/app/superset_home
      - /opt/ppd/stacks/superset/config/superset_config.py:/app/pythonpath/config/superset_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - core_data_net

  superset-worker:
    image: superset-with-playwright:latest
    container_name: superset-worker
    command: ["/app/.venv/bin/celery", "--app=superset.tasks.celery_app:app", "worker", "--loglevel=info", "-c", "2"]
    environment: *superset-env
    volumes:
      - ./superset_home:/app/superset_home
      - /opt/ppd/stacks/superset/config/superset_config.py:/app/pythonpath/config/superset_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Override the image's built-in healthcheck (curl :8088) which only applies
    # to the web server container — workers don't run on port 8088.
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A superset.tasks.celery_app:app inspect ping --timeout 5 2>/dev/null | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - core_data_net
    restart: unless-stopped

  superset-beat:
    image: superset-with-playwright:latest
    container_name: superset-beat
    command: ["/app/.venv/bin/celery", "--app=superset.tasks.celery_app:app", "beat", "--loglevel=info", "-s", "/app/superset_home/celerybeat-schedule"]
    environment: *superset-env
    volumes:
      - ./superset_home:/app/superset_home
      - /opt/ppd/stacks/superset/config/superset_config.py:/app/pythonpath/config/superset_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Beat doesn't expose any port — just verify the scheduler process is alive.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - core_data_net
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - core_data_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - core_data_net

  jupyter-gpu:
    build:
      context: .
      dockerfile: dockerfile.jupyter
    image: jupyter-gpu:local
    container_name: jupyter-gpu
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_WES_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_WES_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./notebooks:/workspace
    working_dir: /workspace
    ports:
      - "8889:8888"
    restart: unless-stopped
    networks:
      - core_data_net
    gpus: all
    command: >
      bash -lc "pip install --no-cache-dir jupyterlab mlflow qdrant-client transformers sentence-transformers scikit-learn xgboost tensorflow &&
      jupyter lab
      --ServerApp.ip=0.0.0.0
      --ServerApp.port=8888
      --ServerApp.allow_remote_access=True
      --ServerApp.open_browser=False
      --ServerApp.token=''
      --ServerApp.trust_xheaders=True
      --allow-root"
  
  dk-ingest:
    image: python:3.11-slim
    container_name: dk-ingest
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: analytics
      DB_USER: analytics
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      ANALYTICS_DB_URI: postgresql+psycopg2://analytics:${ANALYTICS_DB_PASSWORD}@postgres:5432/analytics
      DK_INBOX: /data/inbox
      DK_ARCHIVE: /data/archive
      DK_ERROR: /data/error
      DK_RUN_ONCE: "false"
      DK_POLL_SECONDS: "60"
      DK_SCHEMA: nfl_dfs
    volumes:
      - /opt/ppd/data/inbox/dk:/data/inbox
      - /opt/ppd/data/archive/dk:/data/archive
      - /opt/ppd/data/error/dk:/data/error
      - /opt/ppd/stacks/airflow/airflow/jobs/dk:/app
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir pandas sqlalchemy psycopg2-binary &&
                python -u dk_ingest.py"
    networks:
      - core_data_net
    restart: unless-stopped

  # GPU: see note
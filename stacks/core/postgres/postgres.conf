# =============================================================================
# PostgreSQL Tuned Configuration
# Host: 70GB RAM, 12 cores — analytics workload
# =============================================================================

# ------------------------------------------------------------------------------
# CONNECTIONS
# ------------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# ------------------------------------------------------------------------------
# MEMORY
# ------------------------------------------------------------------------------
shared_buffers = 16GB                   # 25% of RAM — primary buffer cache
effective_cache_size = 48GB             # estimate of OS + PG cache for planner
work_mem = 128MB                        # per sort/hash operation — benefits dbt queries
maintenance_work_mem = 2GB              # VACUUM, index builds, Airbyte bulk loads
wal_buffers = 64MB                      # WAL write buffer

# ------------------------------------------------------------------------------
# PARALLELISM
# ------------------------------------------------------------------------------
max_worker_processes = 12               # match core count
max_parallel_workers = 12
max_parallel_workers_per_gather = 4     # parallel query execution
max_parallel_maintenance_workers = 4    # parallel index creation / VACUUM

# ------------------------------------------------------------------------------
# PLANNER
# ------------------------------------------------------------------------------
default_statistics_target = 200         # better plans on skewed health data distributions
random_page_cost = 1.1                  # tuned for SSD — index scans are cheap
effective_io_concurrency = 200          # SSD parallel I/O prefetch
enable_partitionwise_join = on
enable_partitionwise_aggregate = on

# ------------------------------------------------------------------------------
# WRITE-AHEAD LOG
# ------------------------------------------------------------------------------
wal_level = logical                     # required for Airbyte CDC / logical replication
wal_compression = lz4                   # reduce WAL size with minimal CPU cost
max_wal_size = 4GB                      # reduce checkpoint frequency during Airbyte syncs
min_wal_size = 256MB
checkpoint_completion_target = 0.9     # spread checkpoint I/O over 90% of interval
synchronous_commit = off                # safe trade-off for analytics — minor durability
                                        # window (max ~200ms data loss on crash) for
                                        # significant write throughput improvement

# ------------------------------------------------------------------------------
# AUTOVACUUM
# ------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s                # check for bloat more frequently
autovacuum_vacuum_scale_factor = 0.05   # vacuum at 5% dead tuples (default 20%)
autovacuum_analyze_scale_factor = 0.02  # analyze at 2% new tuples (default 10%)
autovacuum_vacuum_cost_limit = 800      # allow autovacuum to work harder

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
log_min_duration_statement = 1000       # log queries taking longer than 1s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

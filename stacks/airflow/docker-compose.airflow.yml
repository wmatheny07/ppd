services:

  airflow-redis:
    image: redis:7.2-bookworm
    container_name: airflow-redis
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    restart: unless-stopped
    networks:
      - core_data_net

  airflow-webserver:
    build:
      context: ./          # ⬅️ new context
      dockerfile: dockerfile             # ⬅️ new Dockerfile
    image: custom-airflow-ml-dbt:2.10.2  # ⬅️ new image tag
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      airflow-redis:
        condition: service_started
    environment:
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/New_York
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/New_York
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW_UID=${AIRFLOW_UID}
      - AIRFLOW_GID=${AIRFLOW_GID}
      - AIRFLOW__WEBSERVER__WEB_SERVER_HOST=0.0.0.0
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8080
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      # your custom DB envs (used by your jobs)
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${AIRFLOW_DB_NAME}
      - DB_USER=${AIRFLOW_DB_USER}
      - DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - ESPN_DB_HOST=postgres
      - ESPN_DB_PORT=5432
      - ESPN_DB_NAME=${ESPN_DB_NAME}
      - ESPN_DB_USER=${ESPN_DB_USER}
      - ESPN_DB_PASSWORD=${ESPN_DB_PASSWORD}
      - ANALYTICS_DB_HOST=postgres
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
      - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - DBT_PROFILES_DIR=${DBT_PROFILES_DIR}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=wmatheny07@gmail.com
      - AIRFLOW__SMTP__SMTP_PASSWORD=${GMAIL_APP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=wmatheny07@gmail.com
    command: webserver
    ports:
      - "18080:8080"
    restart: unless-stopped
    networks:
      - core_data_net
    volumes:
      # ⬅️ strongly recommend you also mount the same DAGs/plugins here
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/jobs:/opt/airflow/jobs
      - ./airflow/sql:/opt/airflow/sql
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ppd/data:/data
      - /opt/ppd/stacks/airflow/airflow/dbt:/opt/airflow/dbt:rw
      - /opt/ppd/stacks/airflow/airflow/dbt_artifacts:/opt/airflow/dbt_artifacts:rw
      - /opt/airflow/.dbt:/opt/airflow/.dbt:ro
      - /opt/config/runtime:/opt/config/runtime:ro
      - /opt/ppd/stacks/dbt/project:/opt/airflow/dbt/health:rw

  airflow-scheduler:
    build:
      context: ./
      dockerfile: dockerfile
    image: custom-airflow-ml-dbt:2.10.2
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-redis:
        condition: service_started
    environment:
      # (same env vars as you have now)
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/New_York
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/New_York
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${AIRFLOW_DB_NAME}
      - DB_USER=${AIRFLOW_DB_USER}
      - DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - ESPN_DB_HOST=postgres
      - ESPN_DB_PORT=5432
      - ESPN_DB_NAME=${ESPN_DB_NAME}
      - ESPN_DB_USER=${ESPN_DB_USER}
      - ESPN_DB_PASSWORD=${ESPN_DB_PASSWORD}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - ANALYTICS_DB_HOST=postgres
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
      - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - AIRFLOW_GID=${AIRFLOW_GID}
      - DBT_PROFILES_DIR=${DBT_PROFILES_DIR}
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=${GMAIL_APP_USER}
      - AIRFLOW__SMTP__SMTP_PASSWORD=${GMAIL_APP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=${GMAIL_APP_USER}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/jobs:/opt/airflow/jobs
      - ./airflow/sql:/opt/airflow/sql
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ppd/data:/data
      - /opt/ppd/stacks/airflow/airflow/dbt:/opt/airflow/dbt:rw
      - /opt/ppd/stacks/airflow/airflow/dbt_artifacts:/opt/airflow/dbt_artifacts:rw
      - /opt/airflow/.dbt:/opt/airflow/.dbt:ro
      - /opt/config/runtime:/opt/config/runtime:ro
      - /opt/ppd/stacks/dbt/project:/opt/airflow/dbt/health:rw
      - /opt/dbt-docs:/opt/dbt-docs:rw
    command: scheduler
    restart: unless-stopped
    networks:
      - core_data_net

  airflow-worker:
    build:
      context: ./
      dockerfile: dockerfile
    image: custom-airflow-ml-dbt:2.10.2
    container_name: airflow-worker
    hostname: airflow-worker
    depends_on:
      airflow-redis:
        condition: service_started
    environment:
      # same envs as you already have
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/New_York
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/New_York
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${AIRFLOW_DB_NAME}
      - DB_USER=${AIRFLOW_DB_USER}
      - DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - ESPN_DB_HOST=postgres
      - ESPN_DB_PORT=5432
      - ESPN_DB_NAME=${ESPN_DB_NAME}
      - ESPN_DB_USER=${ESPN_DB_USER}
      - ESPN_DB_PASSWORD=${ESPN_DB_PASSWORD}
      - ANALYTICS_DB_HOST=postgres
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
      - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - AIRFLOW_GID=${AIRFLOW_GID}
      - DBT_PROFILES_DIR=${DBT_PROFILES_DIR}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=${GMAIL_APP_USER}
      - AIRFLOW__SMTP__SMTP_PASSWORD=${GMAIL_APP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=${GMAIL_APP_USER}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/jobs:/opt/airflow/jobs
      - ./airflow/sql:/opt/airflow/sql
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ppd/data:/data
      - /opt/ppd/stacks/airflow/airflow/dbt:/opt/airflow/dbt:rw
      - /opt/ppd/stacks/airflow/airflow/dbt_artifacts:/opt/airflow/dbt_artifacts:rw
      - /opt/airflow/.dbt:/opt/airflow/.dbt:ro
      - /opt/config/runtime:/opt/config/runtime:ro
      - /opt/ppd/stacks/dbt/project:/opt/airflow/dbt/health:rw
      - /opt/dbt-docs:/opt/dbt-docs:rw
    command: celery worker
    restart: unless-stopped
    networks:
      - core_data_net

  airflow-init:
    build:
      context: ./
      dockerfile: dockerfile
    image: custom-airflow-ml-dbt:2.10.2
    container_name: airflow-init
    depends_on:
      airflow-redis:
        condition: service_started
    environment:
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=America/New_York
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=America/New_York
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${_AIRFLOW_WWW_USER_USERNAME}
      - _AIRFLOW_WWW_USER_PASSWORD=${_AIRFLOW_WWW_USER_PASSWORD}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - AIRFLOW_GID=${AIRFLOW_GID}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ppd/stacks/dbt/project:/opt/airflow/dbt/health:rw
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Wes \
          --lastname Matheny \
          --role Admin \
          --email wmatheny07@gmail.com
    restart: "no"
    networks:
      - core_data_net

networks:
  core_data_net:
    external: true
analytics_postgres:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres # service name from your core compose
      user: analytics
      password: "{{ env_var('ANALYTICS_DB_PASSWORD') }}"
      port: 5432
      dbname: analytics
      schema: analytics # default schema for your models
      threads: 4
      connect_timeout: 10
      sslmode: disable

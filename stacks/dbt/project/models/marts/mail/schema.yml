models:
- name: mart_mail_inbox
  description: "Actionable inbox view — documents where action_required is true, ranked by recency. Powers the primary mail intelligence Superset dashboard. Only includes documents with a detected document_date."
  columns:
  - name: document_id
    description: "Surrogate key from mail_documents."
    tests: [ not_null ]
  - name: sender
    description: "Normalized sender name."
    tests: [ not_null ]
  - name: document_type
    description: "Claude-assigned document category."
    tests:
    - accepted_values:
        arguments:
          values: [ 'statement', 'eob', 'legal', 'government', 'insurance', 'personal', 'marketing', 'utility', 'unknown' ]
  - name: document_date
    description: "Date of the document as identified by Claude."
    tests: [ not_null ]
  - name: summary
    description: "1-2 sentence plain-English summary generated by Claude."
  - name: action_description
    description: "Plain-English description of the required action."
  - name: minio_key
    description: "S3-compatible object key, used to retrieve the original document from MinIO."
    tests: [ not_null ]
  - name: age_bucket
    description: "Recency bucket for dashboard filtering — This Week, This Month, Last 90 Days, or Older."
    tests:
    - not_null
    - accepted_values:
        arguments:
          values: [ 'This Week', 'This Month', 'Last 90 Days', 'Older' ]
  - name: total_amount
    description: "Sum of all dollar amounts found in the document. Null if no dollar amounts were detected."
  - name: days_old
    description: "Number of days between document_date and today."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
  - name: inbox_rank
    description: "Row number ordered by document_date descending. Rank 1 is the most recent actionable document."
    tests: [ not_null, unique ]

- name: mart_mail_by_sender
  description: "Sender-level rollup of all processed mail — frequency, recency, and total spend for financial document types. Useful for spotting subscription creep, EOB patterns, and VA benefit correspondence frequency."
  columns:
  - name: sender
    description: "Normalized sender name."
    tests: [ not_null ]
  - name: document_type
    description: "Claude-assigned document category for this row's sender/type combination."
    tests: [ not_null ]
  - name: document_count
    description: "Total number of documents received from this sender for this document type."
    tests:
    - not_null
    - dbt_utils.accepted_range:
        arguments:
          min_value: 1
  - name: first_seen
    description: "Earliest document_date on record for this sender/type. Null if no dated documents exist."
  - name: last_seen
    description: "Most recent document_date on record for this sender/type. Null if no dated documents exist."
  - name: days_since_last
    description: "Number of days between last_seen and today. Null if no dated documents exist."
  - name: action_count
    description: "Number of documents from this sender/type where action_required is true."
  - name: total_billed
    description: "Sum of all dollar amounts across statement, utility, and insurance documents for this sender/type. Null or zero for non-financial types."
  - name: is_active_sender
    description: "True if last_seen is within the last 90 days. Null if no dated documents exist."

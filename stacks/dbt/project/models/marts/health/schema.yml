models:
- name: fct_workout_summary
  columns:
  - name: person
    tests: [ not_null ]
  - name: workout_start
    tests: [ not_null ]
  - name: workout_type
    tests: [ not_null ]
  - name: duration_mins
    tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: calories_per_minute
    tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100

- name: fct_hr_zones
  columns:
  - name: record_date
    tests: [ not_null ]
  - name: person
    tests: [ not_null ]
  - name: hr_zone
    tests:
    - not_null
    - accepted_values:
        values: [ 'Recovery', 'Fat Burn', 'Cardio', 'Threshold', 'Peak', 'Unknown' ]
  - name: time_in_zone
    tests:
    - dbt_utils.accepted_range:
        min_value: 0

- name: fct_dim_sleep
  columns:
  - name: record_date
    tests: [ not_null ]
  - name: person
    tests: [ not_null ]
  - name: sleep_type
    tests:
    - not_null
    - accepted_values:
        values: [ 'rem', 'core', 'deep', 'awake' ]
  - name: sleep_duration
    tests:
    - dbt_utils.accepted_range:
        min_value: 0

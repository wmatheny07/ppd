models:
- name: fct_workout_summary
  description: "Mart table summarizing completed workout sessions per person, including duration, distance, and calories burned per minute."
  columns:
  - name: id
    description: "Unique workout session identifier from Apple Health."
  - name: person
    description: "Person identifier (e.g. wes, amanda)."
    tests: [ not_null ]
  - name: workout_type
    description: "Type of workout activity. Run sessions with < 13 cal/min are reclassified as Hiking."
    tests: [ not_null ]
  - name: data_source
    description: "Device or app that recorded the workout (e.g. Apple Watch, iFIT)."
  - name: workout_start
    description: "Timestamp when the workout session started."
    tests: [ not_null ]
  - name: start_nearest_30min
    description: "Workout start time rounded to the nearest 30-minute mark, used for joining with other time-series data."
  - name: workout_end
    description: "Timestamp when the workout session ended. Uses adjusted end time from fct_workout_time_adj if available."
  - name: total_calories
    description: "Total kilocalories burned during the workout. Uses iFIT calories when data source is iFIT."
  - name: duration_mins
    description: "Total workout duration in minutes. Uses adjusted duration when fct_workout_time_adj has a correction."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
  - name: calories_per_minute
    description: "Caloric burn rate calculated as total_calories / duration_mins."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
          max_value: 100
  - name: intensity
    description: "Workout intensity value as reported by Apple Health."

- name: fct_hr_zones
  description: "Incremental mart classifying workout heart rate data into training zones (Recovery, Fat Burn, Cardio, Threshold, Peak) based on age-adjusted max HR."
  columns:
  - name: record_date
    description: "Date of the heart rate zone record."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: workout_type
    description: "Type of workout activity this zone reading is associated with."
  - name: hr_zone
    description: "Training zone classification based on percentage of age-adjusted max HR (220 - age)."
    tests:
    - not_null
    - accepted_values:
        arguments:
          values: [ 'Recovery', 'Fat Burn', 'Cardio', 'Threshold', 'Peak', 'Unknown' ]
  - name: time_in_zone
    description: "Total time spent in this HR zone during the workout in minutes."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0

- name: fct_dim_sleep
  description: "Incremental mart breaking nightly sleep into dimensional rows by sleep type (REM, core, deep, awake) per person and date."
  columns:
  - name: record_date
    description: "Date of the sleep record."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: sleep_type
    description: "Category of sleep stage for this row."
    tests:
    - not_null
    - accepted_values:
        arguments:
          values: [ 'rem', 'core', 'deep', 'awake' ]
  - name: sleep_duration
    description: "Duration of this sleep stage in minutes."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
  - name: total_sleep
    description: "Total sleep duration for the night in minutes (all stages combined)."

- name: fct_sleep_metrics
  description: "Incremental mart of nightly sleep metrics per person, including total sleep duration and breakdown by REM, core, deep, and awake stages."
  columns:
  - name: record_date
    description: "Date of the sleep record."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: rem
    description: "Duration of REM sleep in minutes."
  - name: core
    description: "Duration of core (light) sleep in minutes."
  - name: deep
    description: "Duration of deep sleep in minutes."
  - name: awake
    description: "Duration of time awake during the sleep window in minutes."
  - name: in_bed_start
    description: "Timestamp when the person got into bed."
  - name: sleep_start
    description: "Timestamp when sleep was detected as starting."
  - name: in_bed_end
    description: "Timestamp when the person got out of bed."
  - name: sleep_end
    description: "Timestamp when sleep was detected as ending."
  - name: total_sleep
    description: "Total sleep duration in minutes (rem + core + deep + awake)."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0

- name: fct_sleep_calories
  description: "Incremental mart joining nightly sleep metrics with same-day calorie burn totals, enabling analysis of the relationship between sleep quality and energy expenditure."
  columns:
  - name: record_date
    description: "Date of the sleep and calorie record."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: total_sleep
    description: "Total sleep duration in minutes for the night."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
  - name: awake
    description: "Duration of time awake during the sleep window in minutes."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0
  - name: calories_burned
    description: "Total active kilocalories burned across all workouts on the same date."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 0

- name: fct_active_energy_summary
  description: "Incremental mart aggregating active calorie burn per workout session per person, with start/end timestamps and total calories by data source."
  columns:
  - name: id
    description: "Workout session identifier."
  - name: person
    description: "Person identifier."
  - name: start_time
    description: "Earliest active energy interval timestamp for this workout session."
  - name: end_time
    description: "Latest active energy interval timestamp for this workout session."
  - name: data_source
    description: "Device or app that recorded the active energy data."
  - name: total_calories
    description: "Sum of all active energy intervals for this workout session in kilocalories."

- name: fct_hrv_daily
  description: "Incremental mart aggregating Apple Watch HRV (SDNN) readings to one row per person per day. Each reading is classified into overnight (during sleep), morning (within 2 hours of wake), or daytime windows by joining against fct_sleep_metrics. Morning HRV is the primary forward-looking recovery signal; overnight HRV pairs with resting heart rate for sleep-window analysis."
  columns:
  - name: id
    description: "Surrogate key derived from record_date and person."
    tests: [ not_null, unique ]
  - name: record_date
    description: "Calendar date of the HRV readings."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: avg_hrv
    description: "Average SDNN (ms) across all readings taken on this date, regardless of window. Use for long-term trend lines smoothed by a rolling average."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 1
          max_value: 300
  - name: min_hrv
    description: "Lowest individual SDNN reading recorded on this date."
  - name: max_hrv
    description: "Highest individual SDNN reading recorded on this date."
  - name: reading_count
    description: "Total number of HRV readings recorded on this date across all windows."
    tests:
    - dbt_utils.accepted_range:
        arguments:
          min_value: 1
  - name: morning_avg_hrv
    description: "Average SDNN (ms) from readings taken within 2 hours of wake time (sleep_end). Primary metric for day-over-day recovery tracking and pre-workout readiness. NULL when no matching sleep session exists or no post-wake reading was captured."
  - name: morning_reading_count
    description: "Number of readings in the morning window. Use as a data quality indicator — days with 0 indicate no post-wake readings were captured."
  - name: overnight_avg_hrv
    description: "Average SDNN (ms) from readings taken during the sleep session. Best paired with resting_heart_rate for sleep-window analysis, as both metrics are derived from the same rest period."
  - name: overnight_min_hrv
    description: "Minimum SDNN reading during the sleep session. A notably low value may indicate a period of reduced autonomic regulation during the night."
  - name: overnight_reading_count
    description: "Number of readings captured during the sleep session."

- name: fct_hrv_resting_hr
  description: "Incremental mart joining daily resting heart rate and overnight HRV per person, limited to days where both signals are present. Intended for scatter plot and correlation analysis — both metrics are derived from the sleep window, making them directly comparable as paired recovery indicators."
  columns:
  - name: record_date
    description: "Date of the record."
    tests: [ not_null ]
  - name: person
    description: "Person identifier."
    tests: [ not_null ]
  - name: resting_heart_rate
    description: "Resting heart rate in BPM as computed by Apple Watch from overnight readings."
    tests:
    - not_null
    - dbt_utils.accepted_range:
        arguments:
          min_value: 30
          max_value: 120
  - name: overnight_avg_hrv
    description: "Average SDNN (ms) recorded during the sleep session. Paired with resting_heart_rate as both are measured in the same rest window — the two should move inversely under fatigue and recovery."
    tests:
    - not_null
    - dbt_utils.accepted_range:
        arguments:
          min_value: 1
          max_value: 300

- name: fct_workout_time_adj
  description: "Incremental mart of time-adjusted workout records, filtering outlier sessions based on heart rate percent difference from prior sessions."
  columns:
  - name: id
    description: "Workout session identifier."
  - name: person
    description: "Person identifier."
  - name: start_date
    description: "Earliest active energy interval date for this workout session."
  - name: end_date
    description: "Latest active energy interval date for this workout session."
  - name: updated_end_date
    description: "Corrected end date derived from the interval where the moving average percent difference exceeds 15%, indicating the true workout end."


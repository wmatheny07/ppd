models:
- name: stg_mail_documents
  description: "Staging model joining raw extraction results with Claude enrichment fields. One row per successfully extracted document. Serves as the foundation for all downstream mail marts."
  columns:
  - name: document_id
    description: "Surrogate key from mail_documents."
    tests: [ not_null, unique ]
  - name: minio_key
    description: "S3-compatible object key within the mail bucket (e.g. inbox/2026-04/chase_statement.pdf)."
    tests: [ not_null ]
  - name: file_hash
    description: "SHA-256 hash of the raw file bytes, used for deduplication."
    tests: [ not_null ]
  - name: page_count
    description: "Number of pages in the document. Defaults to 0 if not detected."
  - name: extraction_method
    description: "Method used for text extraction — pdfplumber for digital PDFs, tesseract for scanned/image-based documents."
    tests:
    - accepted_values:
        arguments:
          values: [ 'pdfplumber', 'tesseract', 'doctr' ]
  - name: ingest_ts_utc
    description: "UTC timestamp when the document was first detected in MinIO."
    tests: [ not_null ]
  - name: document_date
    description: "Date of the document as identified by Claude. May be null if not detected."
  - name: document_type
    description: "Claude-assigned document category. Defaults to 'unknown' when enrichment is absent."
    tests:
    - accepted_values:
        arguments:
          values: [ 'statement', 'eob', 'legal', 'government', 'insurance', 'personal', 'marketing', 'utility', 'unknown' ]
  - name: sender
    description: "Normalized sender name from Claude enrichment. Defaults to 'Unknown Sender' when enrichment is absent."
    tests: [ not_null ]
  - name: action_required
    description: "Whether Claude determined this document requires a follow-up action. Defaults to false when enrichment is absent."
    tests: [ not_null ]
  - name: action_description
    description: "Plain-English description of the required action, or null."
  - name: summary
    description: "1-2 sentence plain-English summary of the document generated by Claude."
  - name: dollar_amounts
    description: "JSONB array of labeled dollar amounts found in the document (e.g. [{\"label\":\"amount due\",\"value\":240.00}])."
  - name: addressee_name
    description: "Full name of the primary recipient as Claude read it from the document. Null when no clear addressee is found."
  - name: mail_owner
    description: "Household classification — 'household' for Wesley or Amanda Matheny, 'father' for Kenneth Matheny, 'unknown' when no addressee is identifiable."
    tests:
    - not_null
    - accepted_values:
        arguments:
          values: [ 'household', 'father', 'unknown' ]
  - name: tokens_used
    description: "Total Claude API tokens consumed for enrichment."
  - name: is_recent
    description: "True if the document date falls within the last 30 days."
  - name: document_year
    description: "Calendar year extracted from document_date, for partitioned filtering."
  - name: document_month
    description: "Calendar month extracted from document_date, for partitioned filtering."

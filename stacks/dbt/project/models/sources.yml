version: 2

sources:
- name: espn_raw
  schema: espn_raw # FDW schema in analytics DB
  tables:
  - name: espn_play
  - name: espn_play_participant_stat
  - name: espn_play_team_stat
  - name: espn_event
  - name: espn_team
  - name: espn_athlete
- name: health
  schema: health
  description: >
    Health data ingested from Apple HealthKit via Health-Data-Platform.
    Updated daily with new data from the previous day.
  config:
    freshness:
      warn_after:
        count: 72
        period: hour
      error_after:
        count: 168
        period: hour
    loaded_at_query: |
      select max(_ab_source_file_last_modified::timestamp) from {{ this }}
  tables:
  - name: Workouts
  - name: metrics
- name: raw_weather
  schema: raw_weather
  description: > 
    Raw weather and air quality data   ingested from Open-Meteo via Kafka.
    Updated every 15 minutes for weather observations, hourly for air quality.
  config:
    freshness:
      warn_after:
        count: 30
        period: minute
      error_after:
        count: 2
        period: hour
    loaded_at_field: loaded_at
  tables:
    - name: weather_observations
      description: >
        Raw weather observations from Open-Meteo Forecast API.
        Contains both 15-minute (HRRR) and hourly resolution data
        for 5 monitored locations with health-relevant variables.
      columns:
        - name: id
          description: Auto-incrementing surrogate key
          tests:
            - unique
            - not_null
        - name: location_id
          description: Unique location identifier (e.g. summerville_sc)
          tests:
            - not_null
        - name: observation_time
          description: Timestamp of the weather observation
          tests:
            - not_null
        - name: data_resolution
          description: Resolution of data - '15min' or 'hourly'
          tests:
            - accepted_values: 
                arguments:
                  values: ['15min', 'hourly']
    - name: air_quality_observations
      description: >
        Raw hourly air quality observations from Open-Meteo Air Quality API.
        Includes US AQI, European AQI, particulates, gases, and pollen data.
      columns:
        - name: id
          description: Auto-incrementing surrogate key
          tests:
            - unique
            - not_null
        - name: location_id
          description: Unique location identifier
          tests:
            - not_null
        - name: observation_time
          description: Timestamp of the observation
          tests:
            - not_null
- name: mail_raw
  schema: mail_raw
  description: >
    Raw mail document extraction and AI enrichment tables populated by the
    Dagster mail intelligence pipeline. Documents are scanned PDFs uploaded
    to MinIO; text is extracted via pdfplumber/Tesseract and classified by Claude.
  config:
    freshness:
      warn_after:
        count: 7
        period: day
      error_after:
        count: 30
        period: day
    loaded_at_field: ingest_ts
  tables:
    - name: mail_documents
      description: >
        One row per scanned document ingested from MinIO. Contains the full
        extracted text, extraction method, and status. The search_vector column
        is auto-populated by a Postgres trigger for full-text search.
      columns:
        - name: id
          description: Auto-incrementing surrogate key.
          tests:
            - unique
            - not_null
        - name: minio_key
          description: S3-compatible object key within the mail bucket (e.g. inbox/2026-04/chase_statement.pdf).
          tests:
            - unique
            - not_null
        - name: file_hash
          description: SHA-256 hash of the raw file bytes, used for deduplication.
          tests:
            - not_null
        - name: file_size_bytes
          description: Size of the original file in bytes.
        - name: page_count
          description: Number of pages in the document.
        - name: raw_text
          description: Full text extracted from the document.
        - name: extraction_method
          description: Method used for text extraction — pdfplumber (digital PDF) or tesseract (scanned/OCR).
          tests:
            - accepted_values:
                values: ['pdfplumber', 'tesseract', 'doctr']
        - name: extraction_status
          description: Processing status of this document.
          tests:
            - not_null
            - accepted_values:
                values: ['pending', 'complete', 'failed']
        - name: ingest_ts
          description: Timestamp when the document was first detected in MinIO.
          tests:
            - not_null
        - name: extracted_ts
          description: Timestamp when text extraction completed.
    - name: mail_enrichments
      description: >
        One row per enriched document. Claude classifies the redacted document
        text and returns structured fields (type, sender, dates, dollar amounts,
        action required). Joined to mail_documents on document_id.
      columns:
        - name: id
          description: Auto-incrementing surrogate key.
          tests:
            - unique
            - not_null
        - name: document_id
          description: Foreign key to mail_documents.id.
          tests:
            - not_null
            - relationships:
                to: source('mail_raw', 'mail_documents')
                field: id
        - name: document_type
          description: Claude-assigned document category.
          tests:
            - accepted_values:
                values: ['statement', 'eob', 'legal', 'government', 'insurance', 'personal', 'marketing', 'utility', 'unknown']
        - name: sender_raw
          description: Sender name exactly as Claude read it from the document text.
        - name: sender_normalized
          description: Cleaned and standardized sender name (e.g. "Chase Bank", "Aetna", "VA Benefits").
        - name: document_date
          description: Date of the document as identified by Claude.
        - name: dollar_amounts
          description: JSONB array of labeled dollar amounts found in the document (e.g. [{"label":"amount due","value":240.00}]).
        - name: action_required
          description: Whether Claude determined this document requires a follow-up action.
        - name: action_description
          description: Plain-English description of the required action, or null.
        - name: summary
          description: 1-2 sentence plain-English summary of the document generated by Claude.
        - name: addressee_name
          description: Full name of the primary recipient as Claude read it from the document, or null if unclear.
        - name: mail_owner
          description: Household classification — 'household' (Wesley or Amanda Matheny), 'father' (Kenneth Matheny), or 'unknown'.
          tests:
            - accepted_values:
                values: ['household', 'father', 'unknown']
        - name: model_used
          description: Claude model ID used for this enrichment.
        - name: tokens_used
          description: Total input + output tokens consumed by the Claude API call.
        - name: enriched_ts
          description: Timestamp when enrichment was written.
          tests:
            - not_null
    - name: mail_processing_log
      description: >
        Lightweight audit trail for each pipeline stage (extraction, enrichment, dbt).
        Supplements Dagster's run history with queryable SQL observability.
      columns:
        - name: id
          description: Auto-incrementing surrogate key.
          tests:
            - unique
            - not_null
        - name: document_id
          description: Foreign key to mail_documents.id (nullable for pre-extraction failures).
        - name: stage
          description: Pipeline stage that produced this log entry.
          tests:
            - not_null
            - accepted_values:
                values: ['extraction', 'enrichment', 'dbt']
        - name: status
          description: Outcome of the stage.
          tests:
            - not_null
            - accepted_values:
                values: ['success', 'error']
        - name: message
          description: Error message or informational note.
        - name: dagster_run_id
          description: Dagster run ID for cross-referencing with the Dagster UI.
        - name: logged_ts
          description: Timestamp when the log entry was written.
          tests:
            - not_null

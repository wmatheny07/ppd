name: "analytics"
version: "1.0.0"
config-version: 2

profile: "analytics_marts"

model-paths: [ "models" ]

models:
  analytics:
    +meta:
      owner: "analytics"
      description: "Analytics models for health data"
      release: "1.0.0"
    staging:
      +tags: [ "staging" ]
      health:
        +tags: [ "staging", "health" ]
      espn:
        +enabled: false
      +materialized: view
      +schema: staging
      # +grants:
      #   select: [ 'metabase', 'superset', 'wes' ]
    marts:
      +tags: [ "marts" ]
      health:
        +tags: [ "marts", "health" ]
      espn:
        +enabled: false
      +materialized: table
      +schema: marts
      # +grants:
      #   select: [ 'metabase', 'superset', 'wes' ]
  elementary:
    +schema: elementary

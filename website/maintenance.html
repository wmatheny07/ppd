<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peak Precision Data — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0d1b3e;
      --blue:   #1a3d8a;
      --accent: #3b82f6;
      --sky:    #5ba3f5;
      --white:  #ffffff;
      --muted:  rgba(255,255,255,0.55);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--white);
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 2rem;
      animation: pop .6s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes pop {
      from { opacity:0; transform:scale(.6); }
      to   { opacity:1; transform:scale(1); }
    }

    /* data line draw-on */
    .data-line { stroke-dasharray: 240; stroke-dashoffset: 240; animation: draw 1.4s .5s ease forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: .75rem;
      animation: rise .6s .2s ease both;
    }

    p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      animation: rise .6s .35s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--sky));
      border-radius: 2px;
      margin: 1.5rem auto;
      animation: rise .6s .5s ease both;
    }

    .tagline {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--accent);
      animation: rise .6s .6s ease both;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <svg width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="#5ba3f5"/>
          <stop offset="100%" stop-color="#1a3d8a"/>
        </linearGradient>
        <linearGradient id="rg" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="#4490d0"/>
          <stop offset="100%" stop-color="#132e70"/>
        </linearGradient>
      </defs>
      <polygon points="36,90 66,26 96,90" fill="url(#rg)"/>
      <polygon points="4,90 38,10 72,90" fill="url(#lg)"/>
      <polygon points="38,10 27,28 49,28" fill="white"/>
      <polygon points="66,26 58,38 74,38" fill="white"/>
      <polyline class="data-line" points="8,74 24,60 42,66 62,46 80,28 96,16"
        fill="none" stroke="white" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8"  cy="74" r="4" fill="white"/>
      <circle cx="24" cy="60" r="4" fill="white"/>
      <circle cx="42" cy="66" r="4" fill="white"/>
      <circle cx="62" cy="46" r="4" fill="white"/>
      <circle cx="96" cy="16" r="7.5" fill="#3b82f6"/>
      <circle cx="96" cy="16" r="4"   fill="#1e40af"/>
    </svg>
  </div>

  <div class="tagline">Peak Precision Data</div>
  <div class="divider"></div>
  <h1>Something Great Is Coming</h1>
  <p>We're putting the finishing touches on our new site. Check back soon — or reach out at <strong>wes@peakprecisiondata.com</strong> if you'd like to connect now.</p>

</body>
</html>
